name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application to AlmaLinux VPS
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true

          script: |
            echo "=================================="
            echo "Starting Deployment..."
            echo "=================================="

            APP_DIR="/home/alembicdigilabs/Projects/Divisions/HospiCare/hospi_care_calendar"

            echo "Checking application directory..."

            if [ ! -d "$APP_DIR" ]; then
              echo "ERROR: Application directory does not exist!"
              exit 1
            fi

            cd $APP_DIR

            echo "Current Directory:"
            pwd

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install --production

            echo "Checking PM2 installation..."

            if ! command -v pm2 &> /dev/null
            then
              echo "PM2 not found. Installing PM2..."
              npm install -g pm2
            fi

            echo "Checking PM2 process..."

            pm2 describe hospi_care_calendar > /dev/null

            if [ $? -eq 0 ]; then
              echo "Restarting existing PM2 app..."
              pm2 restart hospi_care_calendar
            else
              echo "Starting new PM2 app..."
              pm2 start server.js --name hospi_care_calendar
            fi

            echo "Saving PM2 process..."
            pm2 save

            echo "PM2 Status:"
            pm2 list

            echo "=================================="
            echo "Deployment Successful!"
            echo "=================================="
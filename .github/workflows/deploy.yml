name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application to AlmaLinux VPS
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22

          script: |
            echo "=============================="
            echo "Starting Deployment..."
            echo "=============================="

            APP_DIR="/home/alembicdigilabs/Projects/Divisions/HospiCare/hospi_care_calendar"

            echo "Moving to application directory..."
            cd $APP_DIR

            echo "Pulling latest code from GitHub..."
            git pull origin main

            echo "Installing dependencies..."
            npm install --production

            echo "Checking PM2 process..."

            pm2 describe hospi_care_calendar > /dev/null

            if [ $? -eq 0 ]
            then
              echo "Application exists. Restarting PM2..."
              pm2 restart hospi_care_calendar
            else
              echo "Application not found. Starting PM2..."
              pm2 start server.js --name hospi_care_calendar
            fi

            echo "Saving PM2 process list..."
            pm2 save

            echo "=============================="
            echo "Deployment Successful!"
            echo "=============================="
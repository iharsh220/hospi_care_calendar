name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application to AlmaLinux VPS
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.HOSPI_CARE }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22

          script: |
            echo "=================================="
            echo "Starting Deployment...."
            echo "=================================="

            APP_DIR="/home/alembicdigilabs/Projects/Divisions/HospiCare/hospi_care_calendar"
            PM2_APP_NAME="HospiCare || Calendar_Automation"

            cd $APP_DIR

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing dependencies..."
            npm install --production

            echo "Restarting PM2..."

            pm2 describe "$PM2_APP_NAME" > /dev/null

            if [ $? -eq 0 ]; then
              pm2 restart "$PM2_APP_NAME"
            else
              pm2 start server.js --name "$PM2_APP_NAME"
            fi

            pm2 save

            echo "PM2 Status:"
            pm2 list

            echo "=================================="
            echo "Deployment Successful!"
            echo "=================================="
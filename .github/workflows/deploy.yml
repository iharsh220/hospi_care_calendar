name: Test SSH Connection

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test VPS Connection
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true

          script: |
            echo "SSH Connected Successfully"
            whoami
            pwd
            ls
name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          debug: true

          script: |
            echo "=================================="
            echo "Starting Deployment..."
            echo "=================================="

            APP_DIR="/home/alembicdigilabs/Projects/Divisions/HospiCare/hospi_care_calendar"

            cd $APP_DIR

            echo "Pull latest code..."
            git pull origin main

            echo "Install dependencies..."
            npm install --production

            echo "Restart PM2..."

            pm2 describe hospi_care_calendar > /dev/null

            if [ $? -eq 0 ]; then
              pm2 restart hospi_care_calendar
            else
              pm2 start server.js --name HospiCare || Calendar_Automation
            fi

            pm2 save

            echo "=================================="
            echo "Deployment Completed Successfully"
            echo "=================================="